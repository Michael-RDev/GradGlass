name: Bug report
description: Something isn't working as expected
labels: ["bug", "needs-triage"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      placeholder: "When I call `run.log_metrics(...)`, I get a KeyError..."
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal code snippet or step sequence that reproduces the issue.
      render: python
      placeholder: |
        import gradglass as gg
        run = gg.run("my_model")
        run.log_metrics({"loss": 0.5})
        # → KeyError: ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include the full traceback if applicable.
      render: shell
    validations:
      required: true

  - type: dropdown
    id: framework
    attributes:
      label: Framework
      description: Which ML framework are you using?
      options:
        - PyTorch
        - TensorFlow / Keras
        - scikit-learn
        - XGBoost
        - LightGBM
        - Other / Not applicable
    validations:
      required: true

  - type: input
    id: gradglass-version
    attributes:
      label: GradGlass version
      placeholder: "1.0.0  (run: pip show gradglass)"
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "3.11.8"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS 14.4 / Ubuntu 22.04 / Windows 11"
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Screenshots, log files, or anything else that might help.
