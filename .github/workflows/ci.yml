name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GRADGLASS_OPEN: "0"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff check
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .

  python-tests:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,torch]"
      - name: Run pytest
        run: pytest

  frontend-tests:
    name: Frontend tests
    runs-on: ubuntu-latest
    needs: lint

    defaults:
      run:
        working-directory: gradglass/dashboard

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: gradglass/dashboard/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Run dashboard tests
        run: npm test

  package-build:
    name: Package build
    runs-on: ubuntu-latest
    needs:
      - python-tests
      - frontend-tests

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: gradglass/dashboard/package-lock.json
      - name: Install frontend dependencies
        working-directory: gradglass/dashboard
        run: npm ci
      - name: Build dashboard bundle
        working-directory: gradglass/dashboard
        run: npm run build
      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" build
      - name: Build wheel and sdist
        run: python -m build
      - name: Verify dashboard bundle is present in both artifacts
        run: |
          python - <<'PY'
          from pathlib import Path
          import tarfile
          import zipfile

          dist = Path("dist")
          wheel = next(dist.glob("*.whl"))
          sdist = next(dist.glob("*.tar.gz"))
          expected = "gradglass/dashboard/dist/index.html"

          with zipfile.ZipFile(wheel) as zf:
              wheel_names = set(zf.namelist())
          assert expected in wheel_names, f"{expected} missing from wheel"

          with tarfile.open(sdist, "r:gz") as tf:
              sdist_names = {
                  member.name.split("/", 1)[1]
                  for member in tf.getmembers()
                  if "/" in member.name
              }
          assert expected in sdist_names, f"{expected} missing from sdist"
          print("Verified dashboard bundle in wheel and sdist.")
          PY
      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: python-dist
          path: dist/*
          retention-days: 14
