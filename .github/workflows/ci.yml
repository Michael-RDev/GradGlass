name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

# Cancel in-progress runs on the same ref to avoid wasting runner time
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Prevent GradGlass from auto-opening a browser during any test run
  GRADGLASS_OPEN: "0"
  # Required by newer pytest-asyncio (>=0.21) — avoids "PytestUnraisableExceptionWarning" noise
  PYTEST_ASYNCIO_MODE: "auto"

jobs:
  # ─────────────────────────────────────────────
  # Job 1 — Lint & Format  (matrix-free, fast)
  # ─────────────────────────────────────────────
  lint:
    name: "Lint & Format (ruff)"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Cache pip's HTTP cache so ruff installs instantly on repeat runs
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: lint-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: lint-pip-

      - name: Install ruff
        run: pip install -e ".[dev]" --no-deps-only 2>/dev/null || pip install ruff

      - name: "ruff: check (lint)"
        # Fails the job if any lint rule is violated
        run: ruff check .

      - name: "ruff: format --check (formatting)"
        # Fails the job if any file is not formatted correctly
        run: ruff format --check .

  # ─────────────────────────────────────────────
  # Job 2 — Test matrix (Python 3.10 / 3.11 / 3.12)
  # ─────────────────────────────────────────────
  test:
    name: "Test (Python ${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    needs: lint  # Only run tests if lint passes

    strategy:
      fail-fast: false  # Let all matrix legs finish so we see all failures at once
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # Cache pip downloads keyed per Python version + dependency lockfile
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: test-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            test-pip-${{ matrix.python-version }}-

      - name: Install project and dev dependencies
        # [dev]   → pytest, pytest-asyncio, pytest-cov, httpx, ruff
        # [torch] → torch (required by test_capture_and_runner.py and test_diff_analysis.py)
        # -e      → editable install so imports resolve to live source
        run: pip install -e ".[dev,torch]"

      - name: Run tests with coverage
        # Excludes tests/data_leakage.py — it has no `test_` prefix and is a
        # standalone __main__ script that requires a live MNIST dataset download.
        run: |
          pytest tests/ \
            --ignore=tests/data_leakage.py \
            --cov=gradglass \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing

      # Upload coverage.xml as a build artifact so it can be downloaded or
      # consumed by a future Codecov / SonarCloud integration step.
      - name: Upload coverage report
        if: matrix.python-version == '3.12'  # Only upload once (from the latest Python)
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 14

  # ─────────────────────────────────────────────
  # Job 3 — Dashboard build (Node.js)
  # ─────────────────────────────────────────────
  dashboard-build:
    name: "Dashboard build (Node.js)"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: gradglass/dashboard

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: gradglass/dashboard/package.json

      - name: Install npm dependencies
        run: npm ci

      - name: Build dashboard (Vite)
        # Ensures the React/Vite build is always valid — catches broken imports,
        # missing components, or Tailwind config errors before they land in main.
        run: npm run build
