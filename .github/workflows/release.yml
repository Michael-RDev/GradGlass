name: Release

on:
  release:
    types: [published]

permissions:
  contents: write
  id-token: write

env:
  GRADGLASS_OPEN: "0"

jobs:
  build:
    name: Build release artifacts
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: gradglass/dashboard/package-lock.json

      - name: Install frontend dependencies
        working-directory: gradglass/dashboard
        run: npm ci

      - name: Build dashboard bundle
        working-directory: gradglass/dashboard
        run: npm run build

      - name: Install packaging tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build wheel and sdist
        run: python -m build

      - name: Smoke-test built wheel
        run: |
          python -m pip install --force-reinstall dist/*.whl
          tmpdir="$(mktemp -d)"
          cd "$tmpdir"
          python -c "import gradglass; print(gradglass.__version__)"

      - name: Attach distributions to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*

      - name: Upload distributions for publish job
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*
          retention-days: 7

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: pypi

    permissions:
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v8
        with:
          name: python-dist
          path: dist

      - name: Publish to PyPI via Trusted Publisher
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
